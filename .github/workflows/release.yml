name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v2.1.0"
        required: true
        type: string

# npm provenance requires the id-token permission. GitHub Release creation is
# handled by release-please; contents: read is sufficient here.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref_name }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - name: Verify tag matches package.json version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${RELEASE_TAG#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag $TAG does not match package.json version $PKG"
            exit 1
          fi
      - run: npm test
      - run: bash plugins/dotbabel/tests/test_validate_settings.sh

      # Trusted Publishing: Node 24 ships an npm CLI new enough to auto-detect
      # the GitHub Actions OIDC env and exchange it for a short-lived publish
      # token. No NPM_TOKEN secret is required as long as the @dotbabel org (or
      # this package) has a Trusted Publisher configured for this repo + workflow.
      - name: Publish to npm with provenance (Trusted Publishing / OIDC)
        run: npm publish --provenance --access public
